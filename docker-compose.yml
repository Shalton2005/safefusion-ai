services:
  db:
    # pgvector/pgvector ships the `vector` extension on top of stock
    # postgres:16 — required by the document_embeddings table (RAG). The
    # migration in alembic/versions/*_add_pgvector_document_embeddings.py
    # runs `CREATE EXTENSION IF NOT EXISTS vector`, which fails on a plain
    # postgres:16-alpine image because the extension's shared library isn't
    # installed there.
    image: pgvector/pgvector:pg16
    container_name: safefusion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: safefusion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d safefusion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: safefusion_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/change-this-password-in-production
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    # Local LLM/embedding server — nomic-embed-text (RAG document
    # embeddings, see src/services/embedding/) and llama3.1:8b (Copilot
    # chat/explain generation, see src/ai/llm/ollama_provider.py) both
    # require this to be reachable. Models aren't baked into the image
    # (they're several GB) — `ollama-pull` below fetches them into the
    # named volume on first startup instead.
    image: ollama/ollama:latest
    container_name: safefusion_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough (RTX 4050, 6GB VRAM) — without this block Docker
    # never attaches an NVIDIA device to the container at all (confirmed:
    # `docker inspect` showed HostConfig.DeviceRequests=null and Ollama's
    # own startup log went straight to `id=cpu library=cpu`, never
    # attempting GPU discovery against a real device). This is the
    # Compose-native equivalent of `docker run --gpus all` and is what
    # Docker Desktop's WSL2 NVIDIA integration expects — no extra runtime
    # flag needed beyond this, since Docker Desktop registers the
    # `nvidia` container runtime and CDI device (`docker.com/gpu=webgpu`)
    # automatically once "Enable GPU support" (Settings > Resources) is on.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-pull:
    # One-shot init container: pulls the two models this project needs
    # into the `ollama_data` volume, then exits. Runs every `docker
    # compose up`, but `ollama pull` is a no-op (fast manifest check) once
    # a model is already present, so this isn't a multi-GB download on
    # every restart — only the first time.
    image: ollama/ollama:latest
    container_name: safefusion_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "ollama pull nomic-embed-text && ollama pull llama3.1:8b"]
    environment:
      OLLAMA_HOST: ollama:11434

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safefusion_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/safefusion_db
      SECRET_KEY: change-this-in-production
      DEBUG: "false"
      API_PREFIX: /api/v1
      PROJECT_NAME: SafeFusion AI
      PROJECT_VERSION: "1.0.0"
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: change-this-password-in-production
      NEO4J_DATABASE: neo4j
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safefusion_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  neo4j_data:
  ollama_data: