services:
  db:
    # pgvector/pgvector ships the `vector` extension on top of stock
    # postgres:16 — required by the document_embeddings table (RAG). The
    # migration in alembic/versions/*_add_pgvector_document_embeddings.py
    # runs `CREATE EXTENSION IF NOT EXISTS vector`, which fails on a plain
    # postgres:16-alpine image because the extension's shared library isn't
    # installed there.
    image: pgvector/pgvector:pg16
    container_name: safefusion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: safefusion_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d safefusion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: safefusion_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/change-this-password-in-production
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safefusion_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/safefusion_db
      SECRET_KEY: change-this-in-production
      DEBUG: "false"
      API_PREFIX: /api/v1
      PROJECT_NAME: SafeFusion AI
      PROJECT_VERSION: "1.0.0"
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: change-this-password-in-production
      NEO4J_DATABASE: neo4j
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  neo4j_data: